name: Deploy Syllabus Hack

on:
  push:
    branches:
      - main
    paths:
      - '**'
  workflow_dispatch: # 手動で実行できるボタンも残す

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Fix Dubious Ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 💾 Setup Astro Build Cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            node_modules/.cache
          key: ${{ runner.os }}-astro-build-syllabus-${{ hashFiles('package-lock.json') }}-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-astro-build-syllabus-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-astro-build-syllabus-

      - name: 🔨 Build Astro Project
        run: npm run build

      - name: 🚀 Deploy via FTP (Diff only)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SYLLABUS_FTP_SERVER || secrets.FTP_SERVER }}
          username: ${{ secrets.SYLLABUS_FTP_USERNAME || secrets.FTP_USERNAME }}
          password: ${{ secrets.SYLLABUS_FTP_PASSWORD || secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: /syllabushack.com/public_html/
          state-name: .ftp-deploy-sync-state-syllabus.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
